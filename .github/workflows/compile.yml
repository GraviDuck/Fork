name: Compilar y Subir fork.elf

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Compilar ELF Estático
      run: |
        # No hace falta instalar gcc, ya viene en el runner de GitHub
        gcc -static fork.c -o fork.elf
        strip fork.elf  # Esto reduce el tamaño del archivo quitando símbolos de depuración
        chmod +x fork.elf

    - name: Commit y Push del binario
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add fork.elf
        git commit -m "Update compiled fork.elf" || exit 0
        git push
